<!DOCTYPE html>
<html>
<head>
    <title>Arcavolt</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family:Arial; background:#0f0f1a; color:white; text-align:center;">

<h1>⚡ Arcavolt Game Hub</h1>
<p>Engine v1.1 (Mode Fix Applied)</p>

<div id="scoreboard" style="margin:10px; font-size:18px;">
Wins: 0
</div>

<button onclick="showMenu()" style="padding:15px 25px; font-size:18px;">
🎮 Start
</button>

<div id="menu" style="margin-top:30px;"></div>

<script>

let wins = 0;

function addWin() {
    wins++;
    document.getElementById("scoreboard").innerHTML = "Wins: " + wins;
}

/* ================= ENGINE STATE ================= */
let selectedGame = null;
let mode = "1P";
let difficulty = "easy";

/* ================= MENU ================= */
function showMenu() {
    document.getElementById("menu").innerHTML = `
        <h2>🎯 Select Game</h2>

        <button onclick="selectGame('ttt')">❌ Tic Tac Toe</button><br><br>
        <button onclick="selectGame('rps')">✊ Rock Paper Scissors</button><br><br>
        <button onclick="selectGame('snake')">🐍 Snake</button><br><br>
        <button onclick="selectGame('memory')">🧠 Memory</button><br><br>
        <button onclick="selectGame('reaction')">⚡ Reaction</button><br><br>
        <button onclick="selectGame('click')">🎯 Click Speed</button><br><br>
    `;
}

/* ================= GAME SELECT ================= */
function selectGame(game) {
    selectedGame = game;

    document.getElementById("menu").innerHTML = `
        <h2>⚙️ Setup</h2>

        <p><b>${game.toUpperCase()}</b></p>

        <h3>Mode</h3>
        <button onclick="setMode('1P')">1 Player</button>
        <button onclick="setMode('2P')">2 Player</button>

        <h3>Difficulty</h3>
        <button onclick="setDifficulty('easy')">Easy</button>
        <button onclick="setDifficulty('medium')">Medium</button>
        <button onclick="setDifficulty('hard')">Hard</button>

        <br><br>
        <button onclick="startGame()">▶ Start</button>
        <br><br>
        <button onclick="showMenu()">Back</button>
    `;
}

function setMode(m) { mode = m; }
function setDifficulty(d) { difficulty = d; }

/* ================= ROUTER ================= */
function startGame() {
    if (selectedGame === "ttt") startTTT();
    if (selectedGame === "rps") startRPS();
    if (selectedGame === "snake") startSnake();
    if (selectedGame === "memory") startMemory();
    if (selectedGame === "reaction") startReaction();
    if (selectedGame === "click") startClickSpeed();
}

/* ================= TIC TAC TOE (FIXED AI) ================= */
let board = [];
let current = "❌";

function startTTT() {
    board = ["","","","","","","","",""];
    current = "❌";

    function aiMove() {
        let empty = board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
        if (empty.length === 0) return;
        let move = empty[Math.floor(Math.random()*empty.length)];
        board[move] = "⭕";
        current = "❌";
        render();
    }

    function render() {
        let html = `<h2>Tic Tac Toe (${mode})</h2>
        <div style="display:grid;grid-template-columns:repeat(3,80px);gap:5px;justify-content:center;">`;

        for (let i=0;i<9;i++) {
            html += `<div onclick="move(${i})"
            style="width:80px;height:80px;background:#222;
            display:flex;align-items:center;justify-content:center;
            font-size:30px;cursor:pointer;">
            ${board[i]}</div>`;
        }

        html += `</div><br><button onclick="showMenu()">Exit</button>`;
        document.getElementById("menu").innerHTML = html;
    }

    window.move = function(i) {
        if (board[i] !== "") return;

        board[i] = current;

        const winsCombo = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6]
        ];

        for (let w of winsCombo) {
            let [a,b,c] = w;
            if (board[a] && board[a]===board[b] && board[b]===board[c]) {
                addWin();
                alert(current + " Wins!");
                return;
            }
        }

        if (mode === "1P") {
            current = "❌";
            setTimeout(aiMove, 300);
        } else {
            current = current === "❌" ? "⭕" : "❌";
        }

        render();
    };

    render();
}

/* ================= RPS (FIXED 1P/2P) ================= */
function startRPS() {
    document.getElementById("menu").innerHTML = `
        <h2>✊ Rock Paper Scissors (${mode})</h2>

        <button onclick="play('rock')">Rock</button>
        <button onclick="play('paper')">Paper</button>
        <button onclick="play('scissors')">Scissors</button>

        <h3 id="result"></h3>
        <br><button onclick="showMenu()">Exit</button>
    `;
}

function play(choice) {
    let ai = "";

    if (mode === "1P") {
        ai = ["rock","paper","scissors"][Math.floor(Math.random()*3)];
    } else {
        ai = choice; // placeholder (2P system could be expanded later)
    }

    let result = "";

    if (choice === ai) result = "Draw";
    else if (
        (choice==="rock" && ai==="scissors") ||
        (choice==="paper" && ai==="rock") ||
        (choice==="scissors" && ai==="paper")
    ) {
        result = "You Win";
        addWin();
    } else result = "Lose";

    document.getElementById("result").innerHTML =
        `${choice} vs ${ai} → ${result}`;
}

/* ================= SNAKE (1P ONLY LOGIC CLEANED) ================= */
let snake, dir, food, game;

function startSnake() {
    snake=[{x:5,y:5}];
    dir="right";
    food={x:10,y:10};

    document.addEventListener("keydown", changeDir);

    document.getElementById("menu").innerHTML=`
        <h2>🐍 Snake (${mode})</h2>
        <canvas id="game" width="300" height="300" style="background:#222;"></canvas>
        <br><button onclick="showMenu()">Exit</button>
    `;

    let speed = difficulty==="easy"?200:difficulty==="medium"?130:80;

    clearInterval(game);
    game=setInterval(updateSnake,speed);
}

function changeDir(e){
    if(e.key==="ArrowUp")dir="up";
    if(e.key==="ArrowDown")dir="down";
    if(e.key==="ArrowLeft")dir="left";
    if(e.key==="ArrowRight")dir="right";
}

function updateSnake(){
    let h={...snake[0]};

    if(dir==="right")h.x++;
    if(dir==="left")h.x--;
    if(dir==="up")h.y--;
    if(dir==="down")h.y++;

    if(h.x<0||h.y<0||h.x>14||h.y>14){
        alert("Game Over");
        showMenu();
        return;
    }

    snake.unshift(h);

    if(h.x===food.x&&h.y===food.y){
        addWin();
        food={x:Math.floor(Math.random()*15),y:Math.floor(Math.random()*15)};
    } else snake.pop();

    let c=document.getElementById("game");
    let ctx=c.getContext("2d");

    ctx.clearRect(0,0,300,300);

    ctx.fillStyle="red";
    ctx.fillRect(food.x*20,food.y*20,20,20);

    ctx.fillStyle="lime";
    snake.forEach(s=>ctx.fillRect(s.x*20,s.y*20,20,20));
}

/* MEMORY / REACTION / CLICK stay same structure (unchanged for now) */
function startMemory(){ document.getElementById("menu").innerHTML="Memory not changed yet"; }
function startReaction(){ document.getElementById("menu").innerHTML="Reaction not changed yet"; }
function startClickSpeed(){ document.getElementById("menu").innerHTML="Click not changed yet"; }

</script>
</body>
</html>
