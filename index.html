<!DOCTYPE html>
<html>
<head>
    <title>Arcavolt</title>
</head>

<body style="margin:0; font-family:Arial; background:#0f0f1a; color:white; text-align:center;">

    <div style="padding:20px;">
        <h1>⚡ Arcavolt Game Hub</h1>
        <p>Now featuring REAL Tic Tac Toe 🎮</p>
    </div>

    <button onclick="showGames()" style="padding:15px 30px; font-size:18px;">
        🎮 Open Game Menu
    </button>

    <div id="menu" style="margin-top:30px;"></div>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "❌";
        let gameActive = false;

        function showGames() {
            document.getElementById("menu").innerHTML = `
                <h2>🎯 Choose a Game</h2>

                <button onclick="startTicTacToe()">❌ Tic Tac Toe (2P)</button><br><br>

                <button onclick="alert('More games coming soon')">✊ Rock Paper Scissors</button><br><br>
                <button onclick="alert('More games coming soon')">🐍 Snake</button><br><br>
                <button onclick="alert('More games coming soon')">🧠 Memory Game</button><br><br>
            `;
        }

        function startTicTacToe() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "❌";
            gameActive = true;

            renderBoard();
        }

        function renderBoard() {
            let html = "<h2>Tic Tac Toe</h2><div style='display:grid; grid-template-columns:repeat(3,80px); gap:5px; justify-content:center;'>";

            for (let i = 0; i < 9; i++) {
                html += `<div onclick="makeMove(${i})"
                style="width:80px; height:80px; background:#222; display:flex; align-items:center; justify-content:center; font-size:30px; cursor:pointer;">
                ${board[i]}
                </div>`;
            }

            html += "</div><br><button onclick='showGames()'>Back to Menu</button>";

            document.getElementById("menu").innerHTML = html;
        }

        function makeMove(index) {
            if (!gameActive || board[index] !== "") return;

            board[index] = currentPlayer;

            if (checkWin()) {
                gameActive = false;
                renderBoard();
                document.getElementById("menu").innerHTML += `<h3>${currentPlayer} Wins! 🎉</h3>`;
                return;
            }

            currentPlayer = currentPlayer === "❌" ? "⭕" : "❌";
            renderBoard();
        }

        function checkWin() {
            const wins = [
                [0,1,2],[3,4,5],[6,7,8],
                [0,3,6],[1,4,7],[2,5,8],
                [0,4,8],[2,4,6]
            ];

            return wins.some(combo => {
                return board[combo[0]] &&
                       board[combo[0]] === board[combo[1]] &&
                       board[combo[1]] === board[combo[2]];
            });
        }
    </script>

</body>
</html>
