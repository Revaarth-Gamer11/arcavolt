<!DOCTYPE html>
<html>
<head>
    <title>Arcavolt</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family:Arial; background:#0f0f1a; color:white; text-align:center;">

<h1>⚡ Arcavolt Game Hub</h1>
<p>Game Engine v1 (Mode System Enabled)</p>

<div id="scoreboard" style="margin:10px; font-size:18px;">
Wins: 0
</div>

<button onclick="showMenu()" style="padding:15px 25px; font-size:18px;">
🎮 Start
</button>

<div id="menu" style="margin-top:30px;"></div>

<script>

/* ================= CORE ================= */
let wins = 0;

function addWin() {
    wins++;
    document.getElementById("scoreboard").innerHTML = "Wins: " + wins;
}

/* ================= ENGINE STATE ================= */
let selectedGame = null;
let mode = "1P";
let difficulty = "easy";

/* ================= MAIN MENU ================= */
function showMenu() {
    document.getElementById("menu").innerHTML = `
        <h2>🎯 Select Game</h2>

        <button onclick="selectGame('ttt')">❌ Tic Tac Toe</button><br><br>
        <button onclick="selectGame('rps')">✊ Rock Paper Scissors</button><br><br>
        <button onclick="selectGame('snake')">🐍 Snake</button><br><br>
        <button onclick="selectGame('memory')">🧠 Memory Game</button><br><br>
        <button onclick="selectGame('reaction')">⚡ Reaction Test</button><br><br>
        <button onclick="selectGame('click')">🎯 Click Speed</button><br><br>
    `;
}

/* ================= GAME SELECT ================= */
function selectGame(game) {
    selectedGame = game;

    document.getElementById("menu").innerHTML = `
        <h2>⚙️ Configure Game</h2>

        <p>Game: <b>${game.toUpperCase()}</b></p>

        <h3>Mode</h3>
        <button onclick="setMode('1P')">1 Player</button>
        <button onclick="setMode('2P')">2 Player</button>

        <h3>Difficulty (1P only)</h3>
        <button onclick="setDifficulty('easy')">Easy</button>
        <button onclick="setDifficulty('medium')">Medium</button>
        <button onclick="setDifficulty('hard')">Hard</button>

        <br><br>
        <button onclick="startGame()">▶ Start Game</button>
        <br><br>
        <button onclick="showMenu()">Back</button>
    `;
}

function setMode(m) {
    mode = m;
}

function setDifficulty(d) {
    difficulty = d;
}

/* ================= START GAME ROUTER ================= */
function startGame() {
    if (selectedGame === "ttt") startTTT();
    if (selectedGame === "rps") startRPS();
    if (selectedGame === "snake") startSnake();
    if (selectedGame === "memory") startMemory();
    if (selectedGame === "reaction") startReaction();
    if (selectedGame === "click") startClickSpeed();
}

/* ================= TIC TAC TOE ================= */
let board = [];
let current = "❌";

function startTTT() {
    board = ["","","","","","","","",""];
    current = "❌";

    function render() {
        let html = `<h2>Tic Tac Toe (${mode})</h2>
        <div style="display:grid;grid-template-columns:repeat(3,80px);
        gap:5px;justify-content:center;">`;

        for (let i = 0; i < 9; i++) {
            html += `
            <div onclick="move(${i})"
            style="width:80px;height:80px;background:#222;
            display:flex;align-items:center;justify-content:center;
            font-size:30px;cursor:pointer;">
            ${board[i]}
            </div>`;
        }

        html += `</div><br><button onclick="showMenu()">Exit</button>`;
        document.getElementById("menu").innerHTML = html;
    }

    window.move = function(i) {
        if (board[i] !== "") return;

        board[i] = current;

        const winCombo = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6]
        ];

        for (let w of winCombo) {
            let [a,b,c] = w;
            if (board[a] && board[a] === board[b] && board[b] === board[c]) {
                addWin();
                alert(current + " Wins!");
                return;
            }
        }

        if (mode === "1P") {
            current = current === "❌" ? "⭕" : "❌";
        } else {
            current = current === "❌" ? "⭕" : "❌";
        }

        render();
    };

    render();
}

/* ================= RPS ================= */
function startRPS() {
    document.getElementById("menu").innerHTML = `
        <h2>✊ Rock Paper Scissors (${mode})</h2>

        <button onclick="play('rock')">Rock</button>
        <button onclick="play('paper')">Paper</button>
        <button onclick="play('scissors')">Scissors</button>

        <h3 id="result"></h3>
        <br><button onclick="showMenu()">Exit</button>
    `;
}

function play(choice) {
    const ai = ["rock","paper","scissors"][Math.floor(Math.random()*3)];

    let result = "";

    if (choice === ai) result = "Draw";
    else if (
        (choice==="rock" && ai==="scissors") ||
        (choice==="paper" && ai==="rock") ||
        (choice==="scissors" && ai==="paper")
    ) {
        result = "You Win";
        addWin();
    } else result = "AI Wins";

    document.getElementById("result").innerHTML =
        `${choice} vs ${ai} → ${result}`;
}

/* ================= SNAKE ================= */
let snake, dir, food, game;

function startSnake() {
    snake = [{x:5,y:5}];
    dir = "right";
    food = {x:10,y:10};

    document.addEventListener("keydown", changeDir);

    document.getElementById("menu").innerHTML = `
        <h2>🐍 Snake (${difficulty})</h2>
        <canvas id="game" width="300" height="300" style="background:#222;"></canvas>
        <br><button onclick="showMenu()">Exit</button>
    `;

    let speed = difficulty === "easy" ? 200 :
                difficulty === "medium" ? 130 : 80;

    clearInterval(game);
    game = setInterval(updateSnake, speed);
}

function changeDir(e) {
    if (e.key==="ArrowUp") dir="up";
    if (e.key==="ArrowDown") dir="down";
    if (e.key==="ArrowLeft") dir="left";
    if (e.key==="ArrowRight") dir="right";
}

function updateSnake() {
    let head = {...snake[0]};

    if (dir==="right") head.x++;
    if (dir==="left") head.x--;
    if (dir==="up") head.y--;
    if (dir==="down") head.y++;

    if (head.x<0||head.y<0||head.x>14||head.y>14) {
        alert("Game Over");
        showMenu();
        return;
    }

    snake.unshift(head);

    if (head.x===food.x && head.y===food.y) {
        addWin();
        food = {x:Math.floor(Math.random()*15),y:Math.floor(Math.random()*15)};
    } else snake.pop();

    drawSnake();
}

function drawSnake() {
    let c=document.getElementById("game");
    let ctx=c.getContext("2d");

    ctx.clearRect(0,0,300,300);

    ctx.fillStyle="red";
    ctx.fillRect(food.x*20,food.y*20,20,20);

    ctx.fillStyle="lime";
    snake.forEach(s=>ctx.fillRect(s.x*20,s.y*20,20,20));
}

/* ================= MEMORY ================= */
function startMemory() {
    const emojis=["🍎","🍌","🍇","🍓","🍍","🥝"];
    let cards=[...emojis,...emojis].sort(()=>Math.random()-0.5);

    let first=null, lock=false;

    document.getElementById("menu").innerHTML=`
        <h2>🧠 Memory (${difficulty})</h2>
        <div id="grid" style="display:grid;grid-template-columns:repeat(4,70px);gap:5px;justify-content:center;"></div>
        <br><button onclick="showMenu()">Exit</button>
    `;

    let grid=document.getElementById("grid");

    cards.forEach(e=>{
        let card=document.createElement("div");
        card.style="width:70px;height:70px;background:#222;display:flex;align-items:center;justify-content:center;font-size:25px;cursor:pointer;";
        card.innerHTML="❓";

        card.onclick=function(){
            if(lock||card.innerHTML!=="❓")return;

            card.innerHTML=e;

            if(!first) first={card,e};
            else{
                lock=true;
                if(first.e!==e){
                    setTimeout(()=>{
                        first.card.innerHTML="❓";
                        card.innerHTML="❓";
                        first=null;
                        lock=false;
                    },700);
                } else {
                    addWin();
                    first=null;
                    lock=false;
                }
            }
        };

        grid.appendChild(card);
    });
}

/* ================= REACTION ================= */
function startReaction() {
    let start=0, timeout;

    document.getElementById("menu").innerHTML=`
        <h2>⚡ Reaction (${difficulty})</h2>
        <div id="box" style="width:200px;height:200px;margin:auto;background:red;display:flex;align-items:center;justify-content:center;cursor:pointer;">WAIT</div>
        <br><button onclick="showMenu()">Exit</button>
    `;

    let box=document.getElementById("box");

    function round(){
        box.style.background="red";
        box.innerHTML="WAIT";

        timeout=setTimeout(()=>{
            box.style.background="green";
            box.innerHTML="CLICK";
            start=Date.now();
        },Math.random()*3000+1000);
    }

    box.onclick=function(){
        if(box.innerHTML==="WAIT")return;

        let reaction=Date.now()-start;
        alert(reaction+" ms");
        addWin();

        clearTimeout(timeout);
        setTimeout(round,1000);
    };

    round();
}

/* ================= CLICK SPEED ================= */
function startClickSpeed() {
    let clicks=0,time=5;

    document.getElementById("menu").innerHTML=`
        <h2>🎯 Click Speed</h2>
        <div id="box" style="width:200px;height:200px;margin:auto;background:#333;display:flex;align-items:center;justify-content:center;cursor:pointer;">START</div>
        <h3 id="info"></h3>
        <br><button onclick="showMenu()">Exit</button>
    `;

    let box=document.getElementById("box");
    let info=document.getElementById("info");

    box.onclick=function(){
        if(time===5) start();
        if(time>0) clicks++;
    };

    function start(){
        let t=setInterval(()=>{
            time--;
            info.innerHTML=`Time: ${time} | Clicks: ${clicks}`;

            if(time<=0){
                clearInterval(t);
                box.innerHTML="Score: "+clicks;
                if(clicks>=25) addWin();
                setTimeout(showMenu,2000);
            }
        },1000);
    }
}

</script>

</body>
</html>
