<!DOCTYPE html>
<html>
<head>
    <title>Arcavolt</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family:Arial; background:#0f0f1a; color:white; text-align:center;">

<h1>⚡ Arcavolt Game Hub</h1>
<p>Engine v1.2 (Real Difficulty System)</p>

<div id="scoreboard" style="margin:10px; font-size:18px;">
Wins: 0
</div>

<button onclick="showMenu()" style="padding:15px 25px; font-size:18px;">
🎮 Start
</button>

<div id="menu" style="margin-top:30px;"></div>

<script>

let wins = 0;

function addWin() {
    wins++;
    document.getElementById("scoreboard").innerHTML = "Wins: " + wins;
}

/* ENGINE STATE */
let selectedGame=null;
let mode="1P";
let difficulty="easy";

/* MENU */
function showMenu(){
    document.getElementById("menu").innerHTML=`
        <h2>🎯 Select Game</h2>

        <button onclick="selectGame('ttt')">❌ Tic Tac Toe</button><br><br>
        <button onclick="selectGame('rps')">✊ Rock Paper Scissors</button><br><br>
        <button onclick="selectGame('snake')">🐍 Snake</button><br><br>
        <button onclick="selectGame('memory')">🧠 Memory</button><br><br>
        <button onclick="selectGame('reaction')">⚡ Reaction</button><br><br>
        <button onclick="selectGame('click')">🎯 Click Speed</button><br><br>
    `;
}

function selectGame(game){
    selectedGame=game;

    document.getElementById("menu").innerHTML=`
        <h2>⚙️ Setup</h2>

        <p><b>${game.toUpperCase()}</b></p>

        <h3>Mode</h3>
        <button onclick="mode='1P'">1 Player</button>
        <button onclick="mode='2P'">2 Player</button>

        <h3>Difficulty</h3>
        <button onclick="difficulty='easy'">Easy</button>
        <button onclick="difficulty='medium'">Medium</button>
        <button onclick="difficulty='hard'">Hard</button>

        <br><br>
        <button onclick="startGame()">▶ Start</button>
        <br><br>
        <button onclick="showMenu()">Back</button>
    `;
}

/* ROUTER */
function startGame(){
    if(selectedGame==="ttt")startTTT();
    if(selectedGame==="rps")startRPS();
    if(selectedGame==="snake")startSnake();
    if(selectedGame==="memory")startMemory();
    if(selectedGame==="reaction")startReaction();
    if(selectedGame==="click")startClickSpeed();
}

/* ================= TIC TAC TOE (REAL DIFFICULTY AI) ================= */
let board=[], current="❌";

function startTTT(){
    board=["","","","","","","","",""];
    current="❌";

    function aiMove(){
        let empty=board.map((v,i)=>v===""?i:null).filter(v=>v!==null);

        let move;

        if(difficulty==="easy"){
            move=empty[Math.floor(Math.random()*empty.length)];
        }
        else if(difficulty==="medium"){
            move=empty[Math.random()<0.5?0:Math.floor(Math.random()*empty.length)];
        }
        else{
            // hard: tries center first, then random
            if(board[4]==="") move=4;
            else move=empty[Math.floor(Math.random()*empty.length)];
        }

        board[move]="⭕";
        render();
    }

    function render(){
        let html=`<h2>Tic Tac Toe (${difficulty})</h2>
        <div style="display:grid;grid-template-columns:repeat(3,80px);gap:5px;justify-content:center;">`;

        for(let i=0;i<9;i++){
            html+=`<div onclick="move(${i})"
            style="width:80px;height:80px;background:#222;
            display:flex;align-items:center;justify-content:center;
            font-size:30px;cursor:pointer;">
            ${board[i]}</div>`;
        }

        html+=`</div><br><button onclick="showMenu()">Exit</button>`;
        document.getElementById("menu").innerHTML=html;
    }

    window.move=function(i){
        if(board[i]!=="")return;

        board[i]=current;

        if(mode==="1P"){
            current="❌";
            setTimeout(aiMove, difficulty==="hard"?150:400);
        } else {
            current=current==="❌"?"⭕":"❌";
        }

        render();
    };

    render();
}

/* ================= RPS (DIFFICULT AI) ================= */
function startRPS(){
    document.getElementById("menu").innerHTML=`
        <h2>✊ RPS (${difficulty})</h2>

        <button onclick="play('rock')">Rock</button>
        <button onclick="play('paper')">Paper</button>
        <button onclick="play('scissors')">Scissors</button>

        <h3 id="result"></h3>
        <br><button onclick="showMenu()">Exit</button>
    `;
}

function play(choice){
    let ai;

    if(difficulty==="easy"){
        ai="rock";
    }
    else if(difficulty==="medium"){
        ai=["rock","paper","scissors"][Math.floor(Math.random()*3)];
    }
    else{
        // hard AI tries to counter player
        ai =
            choice==="rock"?"paper":
            choice==="paper"?"scissors":"rock";
    }

    let result="";

    if(choice===ai) result="Draw";
    else if(
        (choice==="rock"&&ai==="scissors")||
        (choice==="paper"&&ai==="rock")||
        (choice==="scissors"&&ai==="paper")
    ){
        result="You Win";
        addWin();
    } else result="Lose";

    document.getElementById("result").innerHTML=
    `${choice} vs ${ai} → ${result}`;
}

/* ================= SNAKE (REAL SPEED DIFFICULTY) ================= */
let snake,dir,food,game;

function startSnake(){
    snake=[{x:5,y:5}];
    dir="right";
    food={x:10,y:10};

    document.addEventListener("keydown",e=>{
        if(e.key==="ArrowUp")dir="up";
        if(e.key==="ArrowDown")dir="down";
        if(e.key==="ArrowLeft")dir="left";
        if(e.key==="ArrowRight")dir="right";
    });

    document.getElementById("menu").innerHTML=`
        <h2>🐍 Snake (${difficulty})</h2>
        <canvas id="game" width="300" height="300" style="background:#222;"></canvas>
        <br><button onclick="showMenu()">Exit</button>
    `;

    let speed =
        difficulty==="easy"?220:
        difficulty==="medium"?130:70;

    clearInterval(game);
    game=setInterval(updateSnake,speed);
}

function updateSnake(){
    let h={...snake[0]};

    if(dir==="right")h.x++;
    if(dir==="left")h.x--;
    if(dir==="up")h.y--;
    if(dir==="down")h.y++;

    if(h.x<0||h.y<0||h.x>14||h.y>14){
        alert("Game Over");
        showMenu();
        return;
    }

    snake.unshift(h);

    if(h.x===food.x&&h.y===food.y){
        addWin();
        food={x:Math.floor(Math.random()*15),y:Math.floor(Math.random()*15)};
    } else snake.pop();

    let c=document.getElementById("game");
    let ctx=c.getContext("2d");

    ctx.clearRect(0,0,300,300);

    ctx.fillStyle="red";
    ctx.fillRect(food.x*20,food.y*20,20,20);

    ctx.fillStyle="lime";
    snake.forEach(s=>ctx.fillRect(s.x*20,s.y*20,20,20));
}

/* ================= MEMORY (REAL DIFFICULTY) ================= */
function startMemory(){
    let size =
        difficulty==="easy"?4:
        difficulty==="medium"?6:8;

    let emojis=["🍎","🍌","🍇","🍓","🍍","🥝","🍉","🍒"];
    let cards=[...emojis.slice(0,size/2),...emojis.slice(0,size/2)]
        .sort(()=>Math.random()-0.5);

    let first=null,lock=false;

    document.getElementById("menu").innerHTML=`
        <h2>🧠 Memory (${difficulty})</h2>
        <div id="grid" style="display:grid;grid-template-columns:repeat(4,70px);gap:5px;justify-content:center;"></div>
        <br><button onclick="showMenu()">Exit</button>
    `;

    let grid=document.getElementById("grid");

    cards.forEach(e=>{
        let card=document.createElement("div");
        card.style="width:70px;height:70px;background:#222;display:flex;align-items:center;justify-content:center;font-size:25px;cursor:pointer;";
        card.innerHTML="❓";

        card.onclick=function(){
            if(lock||card.innerHTML!=="❓")return;

            card.innerHTML=e;

            if(!first)first={card,e};
            else{
                lock=true;

                if(first.e!==e){
                    setTimeout(()=>{
                        first.card.innerHTML="❓";
                        card.innerHTML="❓";
                        first=null;
                        lock=false;
                    },difficulty==="easy"?900:600);
                } else {
                    addWin();
                    first=null;
                    lock=false;
                }
            }
        };

        grid.appendChild(card);
    });
}

/* ================= REACTION ================= */
function startReaction(){
    let start=0,timeout;

    document.getElementById("menu").innerHTML=`
        <h2>⚡ Reaction (${difficulty})</h2>
        <div id="box" style="width:200px;height:200px;margin:auto;background:red;display:flex;align-items:center;justify-content:center;cursor:pointer;">WAIT</div>
        <br><button onclick="showMenu()">Exit</button>
    `;

    let box=document.getElementById("box");

    function round(){
        let delay =
            difficulty==="easy"?3000:
            difficulty==="medium"?2000:1200;

        box.style.background="red";
        box.innerHTML="WAIT";

        timeout=setTimeout(()=>{
            box.style.background="green";
            box.innerHTML="CLICK";
            start=Date.now();
        },Math.random()*delay);
    }

    box.onclick=function(){
        if(box.innerHTML==="WAIT")return;

        let reaction=Date.now()-start;
        alert(reaction+" ms");
        addWin();

        clearTimeout(timeout);
        setTimeout(round,1000);
    };

    round();
}

/* ================= CLICK SPEED ================= */
function startClickSpeed(){
    let time=
        difficulty==="easy"?7:
        difficulty==="medium"?5:3;

    let clicks=0;

    document.getElementById("menu").innerHTML=`
        <h2>🎯 Click Speed (${difficulty})</h2>
        <div id="box" style="width:200px;height:200px;margin:auto;background:#333;display:flex;align-items:center;justify-content:center;cursor:pointer;">START</div>
        <h3 id="info"></h3>
        <br><button onclick="showMenu()">Exit</button>
    `;

    let box=document.getElementById("box");
    let info=document.getElementById("info");

    box.onclick=function(){
        if(time=== (difficulty==="easy"?7:difficulty==="medium"?5:3)) start();
        if(time>0)clicks++;
    };

    function start(){
        let t=setInterval(()=>{
            time--;
            info.innerHTML=`Time: ${time} | Clicks: ${clicks}`;

            if(time<=0){
                clearInterval(t);
                box.innerHTML="Score: "+clicks;
                if(clicks>=20)addWin();
                setTimeout(showMenu,2000);
            }
        },1000);
    }
}

</script>
</body>
</html>
