<script>
let board = [];
let gameMode = "";
let currentPlayer = "❌";
let gameActive = false;

/* SNAKE VARIABLES */
let snake = [];
let food = {};
let direction = "right";
let gameInterval;
let score = 0;

/* MENU */
function showGames() {
    document.getElementById("menu").innerHTML = `
        <h2>🎯 Choose a Game</h2>

        <button onclick="startTicTacToe()">❌ Tic Tac Toe</button><br><br>
        <button onclick="startRPS()">✊ Rock Paper Scissors</button><br><br>
        <button onclick="startSnake()">🐍 Snake Game</button><br><br>
        <button onclick="alert('Next: Memory Game')">🧠 Memory Game</button><br><br>
        <button onclick="alert('Next: Guess Number')">🔢 Guess Number</button><br><br>
    `;
}

/* ---------------- TIC TAC TOE (kept simple placeholder so code doesn't break) */
function startTicTacToe() {
    document.getElementById("menu").innerHTML = "<h2>Tic Tac Toe (already built earlier)</h2><button onclick='showGames()'>Back</button>";
}

/* ---------------- ROCK PAPER SCISSORS */
function startRPS() {
    document.getElementById("menu").innerHTML = `
        <h2>✊ Rock Paper Scissors</h2>
        <button onclick="playRPS('rock')">🪨 Rock</button>
        <button onclick="playRPS('paper')">📄 Paper</button>
        <button onclick="playRPS('scissors')">✂ Scissors</button>
        <h3 id="rpsResult"></h3>
        <br><button onclick="showGames()">Back</button>
    `;
}

function playRPS(p) {
    const ai = ["rock","paper","scissors"][Math.floor(Math.random()*3)];
    let result = "";

    if (p === ai) result = "Draw 🤝";
    else if (
        (p==="rock"&&ai==="scissors")||
        (p==="paper"&&ai==="rock")||
        (p==="scissors"&&ai==="paper")
    ) result = "You Win 🎉";
    else result = "AI Wins 🤖";

    document.getElementById("rpsResult").innerHTML =
        `You: ${p} | AI: ${ai} → ${result}`;
}

/* ---------------- SNAKE GAME (NEW REAL GAME) */
function startSnake() {
    snake = [{x:5, y:5}];
    direction = "right";
    score = 0;

    spawnFood();

    document.getElementById("menu").innerHTML = `
        <h2>🐍 Snake Game</h2>
        <p>Score: <span id="score">0</span></p>

        <canvas id="game" width="300" height="300"
        style="background:#222;"></canvas>

        <br><br>
        <button onclick="showGames()">Back</button>

        <p>Use arrow keys (or swipe later)</p>
    `;

    document.addEventListener("keydown", changeDirection);

    clearInterval(gameInterval);
    gameInterval = setInterval(updateGame, 200);
}

function spawnFood() {
    food = {
        x: Math.floor(Math.random()*15),
        y: Math.floor(Math.random()*15)
    };
}

function changeDirection(e) {
    if (e.key === "ArrowUp") direction = "up";
    if (e.key === "ArrowDown") direction = "down";
    if (e.key === "ArrowLeft") direction = "left";
    if (e.key === "ArrowRight") direction = "right";
}

function updateGame() {
    let head = { ...snake[0] };

    if (direction === "right") head.x++;
    if (direction === "left") head.x--;
    if (direction === "up") head.y--;
    if (direction === "down") head.y++;

    /* collision */
    if (
        head.x < 0 || head.y < 0 ||
        head.x > 14 || head.y > 14
    ) {
        clearInterval(gameInterval);
        alert("Game Over! Score: " + score);
        showGames();
        return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
        score++;
        spawnFood();
    } else {
        snake.pop();
    }

    drawGame();
}

function drawGame() {
    let canvas = document.getElementById("game");
    let ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,300,300);

    /* food */
    ctx.fillStyle = "red";
    ctx.fillRect(food.x*20, food.y*20, 20, 20);

    /* snake */
    ctx.fillStyle = "lime";
    snake.forEach(part => {
        ctx.fillRect(part.x*20, part.y*20, 20, 20);
    });

    document.getElementById("score").innerText = score;
}
</script>
