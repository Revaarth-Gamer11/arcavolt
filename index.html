<!DOCTYPE html>
<html>
<head>
    <title>Arcavolt</title>
</head>

<body style="margin:0; font-family:Arial; background:#0f0f1a; color:white; text-align:center;">

<h1>⚡ Arcavolt Game Hub</h1>
<p>Memory Game FIXED VERSION 🧠</p>

<button onclick="showMenu()" style="padding:15px 25px; font-size:18px;">
🎮 Open Game Menu
</button>

<div id="menu" style="margin-top:30px;"></div>

<script>

function showMenu() {
    document.getElementById("menu").innerHTML = `
        <h2>🎯 Games</h2>
        <button onclick="startMemory()">🧠 Memory Game</button>
    `;
}

/* ================= MEMORY GAME (REBUILT PROPERLY) ================= */

function startMemory() {
    const emojis = ["🍎","🍌","🍇","🍓","🍍","🥝"];
    let cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);

    let first = null;
    let lock = false;

    const menu = document.getElementById("menu");

    menu.innerHTML = `
        <h2>🧠 Memory Game</h2>
        <div id="grid" style="display:grid;grid-template-columns:repeat(4,70px);
        gap:5px;justify-content:center;"></div>
        <br><button onclick="showMenu()">Back</button>
    `;

    const grid = document.getElementById("grid");

    // create cards properly (NO innerHTML click bugs)
    cards.forEach((emoji, i) => {
        const div = document.createElement("div");

        div.style.width = "70px";
        div.style.height = "70px";
        div.style.background = "#222";
        div.style.display = "flex";
        div.style.alignItems = "center";
        div.style.justifyContent = "center";
        div.style.fontSize = "25px";
        div.style.cursor = "pointer";

        div.innerHTML = "❓";

        div.addEventListener("click", function () {
            if (lock) return;
            if (div.innerHTML !== "❓") return;

            div.innerHTML = emoji;

            if (first === null) {
                first = { index: i, element: div, emoji: emoji };
            } else {
                lock = true;

                if (first.emoji !== emoji) {
                    setTimeout(() => {
                        first.element.innerHTML = "❓";
                        div.innerHTML = "❓";
                        first = null;
                        lock = false;
                    }, 700);
                } else {
                    first = null;
                    lock = false;
                }
            }
        });

        grid.appendChild(div);
    });
}

</script>

</body>
</html>
